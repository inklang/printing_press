name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --lib

  build-release:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Package
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/printing_press.exe artifacts/printing_press.exe
          else
            cp target/release/printing_press artifacts/printing_press
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: printing_press-${{ matrix.os }}
          path: artifacts/

  create-release:
    needs: build-release
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display structure of downloaded files
        shell: bash
        run: ls -laR artifacts/

      - name: Create tag
        run: |
          TAG="v$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)"
          git tag $TAG
          git push origin $TAG

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/printing_press-ubuntu-latest/printing_press
            artifacts/printing_press-windows-latest/printing_press.exe
            artifacts/printing_press-macos-latest/printing_press
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
